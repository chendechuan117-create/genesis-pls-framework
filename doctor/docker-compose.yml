services:
  doctor:
    build:
      context: .
      dockerfile: Dockerfile
    image: genesis-sandbox:latest
    container_name: genesis-doctor
    working_dir: /workspace
    entrypoint: ["/bin/bash", "/doctor/entrypoint.sh"]
    stdin_open: true
    tty: true
    mem_limit: 1g
    memswap_limit: 1.5g
    volumes:
      - ..:/src/genesis:ro
      - ../venv:/opt/venv:ro
      - ${GENESIS_DB_PATH:-~/.genesis/workshop_v4.sqlite}:/src/db/workshop_v4.sqlite:ro
      - ./entrypoint.sh:/doctor/entrypoint.sh:ro
      - genesis-doctor-workspace:/workspace
      - /usr:/usr:ro
      - /lib:/lib:ro
      - /lib64:/lib64:ro
volumes:
  genesis-doctor-workspace:
